<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мавзӯъҳо — EduTech</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  .topic-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:0.25s;cursor:pointer;}
  .topic-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
  .topic-header{height:120px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,rgba(26,115,232,0.15),rgba(255,107,53,0.08));}
  .topic-body{padding:20px;}
  .topic-body h3{margin-bottom:6px;font-size:1rem;}
  .topic-body p{color:var(--muted);font-size:0.83rem;margin-bottom:14px;line-height:1.5;}
  .video-card{background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
  .video-card video{width:160px;border-radius:8px;flex-shrink:0;}
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Edu<span>Tech</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/dashboard.html"><span class="nav-icon">🏠</span>Асосӣ</a>
      <a class="nav-item active" href="/pupil.html"><span class="nav-icon">📚</span>Мавзӯъҳо</a>
      <a class="nav-item" href="/test.html"><span class="nav-icon">📝</span>Тестҳо</a>
      <a class="nav-item" href="/zadacha.html"><span class="nav-icon">💻</span>Масъалаҳо</a>
      <a class="nav-item" href="/interpretator.html"><span class="nav-icon">⚡</span>Интерпретатор</a>
      <a class="nav-item" href="/reyting.html"><span class="nav-icon">🏆</span>Рейтинг</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="avatarLetter">S</div>
        <div><div class="user-name" id="sidebarName">Хонанда</div><div class="user-role">Хонанда</div></div>
      </div>
      <button class="btn btn-outline btn-sm" style="width:100%;margin-top:10px;justify-content:center" onclick="logout()">Баромадан</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header"><div><h1>📚 Мавзӯъҳо</h1><div class="breadcrumb">Ҳамаи курсҳо ва мавзӯъҳо</div></div></div>
    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <input type="text" class="form-control" id="searchInput" placeholder="🔍 Ҷустуҷӯи мавзӯъ..." oninput="filterTopics()" style="flex:1;min-width:200px">
      <select class="form-control" style="max-width:180px" id="catFilter" onchange="filterTopics()"><option value="">Ҳамаи категорияҳо</option></select>
    </div>
    <div class="card-grid" id="topicsGrid"></div>
  </main>
</div>
<div class="modal-overlay" id="modalTopicView">
  <div class="modal" style="max-width:700px;max-height:90vh;overflow-y:auto">
    <div class="modal-header"><h3 id="topicViewTitle">Мавзӯъ</h3><button class="modal-close" onclick="hideModal('modalTopicView')">✕</button></div>
    <p id="topicViewDesc" style="color:var(--muted);margin-bottom:20px;font-size:0.9rem"></p>
    <h4 style="margin-bottom:14px">🎬 Видеодарсҳо</h4>
    <div id="topicVideoList"></div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <a href="/test.html" class="btn btn-primary">📝 Тест гузаштан</a>
      <a href="/zadacha.html" class="btn btn-outline">💡 Масъалаҳо</a>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script>
const session=requireAuth('student');
if(session){document.getElementById('sidebarName').textContent=session.name;document.getElementById('avatarLetter').textContent=session.name[0];}
const emojis={'Барномасозӣ':'🐍','Веб':'🌐','Математика':'🔢','Физика':'📐','Умумӣ':'📖'};
let allTopics=[];
function render(){
  const data=Storage.getData();
  allTopics=data.topics;
  const cats=[...new Set(allTopics.map(t=>t.category).filter(Boolean))];
  const catSel=document.getElementById('catFilter');
  catSel.innerHTML='<option value="">Ҳамаи категорияҳо</option>'+cats.map(c=>`<option>${c}</option>`).join('');
  filterTopics();
}
function filterTopics(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const f=allTopics.filter(t=>(!q||t.title.toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q))&&(!cat||t.category===cat));
  document.getElementById('topicsGrid').innerHTML=f.length?f.map(t=>`
    <div class="topic-card" onclick="viewTopic(${t.id})">
      <div class="topic-header">${emojis[t.category]||'📖'}</div>
      <div class="topic-body">
        <span class="badge badge-primary" style="margin-bottom:8px">${t.category||'Умумӣ'}</span>
        <h3>${t.title}</h3>
        <p>${t.description||''}</p>
        <div style="display:flex;align-items:center">
          <span style="font-size:0.8rem;color:var(--muted)">🎬 ${(t.videos||[]).length} видео</span>
          <button class="btn btn-primary btn-sm" style="margin-left:auto">Кушодан →</button>
        </div>
      </div>
    </div>`).join(''):'<p style="color:var(--muted);grid-column:1/-1">Мавзӯъ ёфт нашуд</p>';
}
function viewTopic(id){
  const t=Storage.getData().topics.find(x=>x.id===id);
  document.getElementById('topicViewTitle').textContent=t.title;
  document.getElementById('topicViewDesc').textContent=t.description||'';
  document.getElementById('topicVideoList').innerHTML=(t.videos||[]).length?
    t.videos.map(v=>`<div class="video-card"><video controls src="${v.url}"></video><div><strong>${v.name}</strong><br><span style="color:var(--muted);font-size:0.82rem">${v.size||''}</span></div></div>`).join(''):
    '<p style="color:var(--muted);text-align:center;padding:20px">🎬 Видео ҳанӯз илова нашудааст</p>';
  showModal('modalTopicView');
}
render();
</script>
</body>
</html>
